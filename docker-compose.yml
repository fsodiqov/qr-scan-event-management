# Local MongoDB — faqat Atlas ishlatmasangiz kerak.
# Hozir backend/.env da MongoDB Atlas URI bor, shu servis ixtiyoriy.
services:
  mongodb:
    image: mongo:7
    container_name: qr-event-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: qr-event-management

volumes:
  mongodb_data:
